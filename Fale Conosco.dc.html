<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
          href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap"
          rel="stylesheet"
        />
      </helmet>
      <div class="site-wrapper">
        <dc-import name="Header" hint-size="100%,72px"></dc-import>

        <section data-screen-label="Banner" class="banner">
          <img
            src="images/espiritualidade-e-religiao-as-maos-postas-em-oracao-sobre-uma-biblia-sagrada-na-igreja-conceito-de-fe.jpg"
            alt="Mãos em oração sobre a Bíblia"
            class="banner-media obj-center-35"
          />
          <div class="banner-overlay"></div>
          <div class="banner-content">
            <p
              style="
                margin: 0 0 12px;
                font-size: 12px;
                letter-spacing: 0.24em;
                font-weight: 600;
                color: #f1b79e;
              "
            >
              ESTAMOS POR PERTO
            </p>
            <h1
              style="
                margin: 0;
                font-size: clamp(2.2rem, 5.5vw, 3.8rem);
                font-weight: 800;
                letter-spacing: -0.02em;
                line-height: 1.02;
              "
            >
              Fale
              <span
                style="
                  font-family: &quot;Newsreader&quot;, serif;
                  font-style: italic;
                  font-weight: 400;
                "
                >conosco</span
              >
            </h1>
          </div>
        </section>

        <div class="container-wide">
          <div data-reveal data-contact-grid class="grid-3">
            <a
              href="https://wa.me/5585997104597"
              target="_blank"
              rel="noopener"
              class="card-link"
              style-hover="transform:translateY(-3px)"
            >
              <span
                style="
                  width: 52px;
                  height: 52px;
                  border-radius: 14px;
                  background: #feeee7;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                "
                ><img src="images/icontelefone.svg" alt="" class="ico-24"
              /></span>
              <span
                ><span
                  style="
                    display: block;
                    font-size: 12px;
                    letter-spacing: 0.1em;
                    color: #8a847a;
                    font-weight: 600;
                    margin-bottom: 4px;
                  "
                  >WHATSAPP</span
                ><span style="font-size: 16px; font-weight: 700"
                  >(85) 99710-4597</span
                ></span
              >
            </a>
            <a
              href="mailto:contato@ccf.org.br"
              class="card-link"
              style-hover="transform:translateY(-3px)"
            >
              <span
                style="
                  width: 52px;
                  height: 52px;
                  border-radius: 14px;
                  background: #feeee7;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                "
                ><img src="images/iconmail.svg" alt="" class="ico-24"
              /></span>
              <span
                ><span
                  style="
                    display: block;
                    font-size: 12px;
                    letter-spacing: 0.1em;
                    color: #8a847a;
                    font-weight: 600;
                    margin-bottom: 4px;
                  "
                  >E-MAIL</span
                ><span
                  style="
                    font-size: 16px;
                    font-weight: 700;
                    word-break: break-all;
                  "
                  >contato@ccf.org.br</span
                ></span
              >
            </a>
            <a
              href="https://www.google.com/maps/place/R.+Lauro+Maia,+1196+-+Jos%C3%A9+Bonifacio,+Fortaleza+-+CE,+60055-295"
              target="_blank"
              rel="noopener"
              class="card-link"
              style-hover="transform:translateY(-3px)"
            >
              <span
                style="
                  width: 52px;
                  height: 52px;
                  border-radius: 14px;
                  background: #feeee7;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                "
                ><img src="images/iconlocation.svg" alt="" class="ico-24"
              /></span>
              <span
                ><span
                  style="
                    display: block;
                    font-size: 12px;
                    letter-spacing: 0.1em;
                    color: #8a847a;
                    font-weight: 600;
                    margin-bottom: 4px;
                  "
                  >ENDEREÇO</span
                ><span
                  style="font-size: 15px; font-weight: 700; line-height: 1.35"
                  >Rua Lauro Maia, 1196<br />Bairro de Fátima ·
                  Fortaleza/CE</span
                ></span
              >
            </a>
          </div>

          <div
            data-reveal
            data-form-grid
            style="
              margin-top: 28px;
              background: #24211d;
              border-radius: 24px;
              overflow: hidden;
              display: grid;
              grid-template-columns: 0.85fr 1.15fr;
            "
          >
            <div
              style="
                padding: clamp(32px, 4vw, 48px);
                display: flex;
                flex-direction: column;
                justify-content: center;
                color: #fff;
              "
            >
              <p
                style="
                  margin: 0 0 12px;
                  font-size: 12px;
                  letter-spacing: 0.2em;
                  font-weight: 700;
                  color: #f1b79e;
                "
              >
                QUEREMOS OUVIR VOCÊ
              </p>
              <h2
                style="
                  margin: 0;
                  font-size: clamp(1.6rem, 3vw, 2.4rem);
                  font-weight: 800;
                  letter-spacing: -0.01em;
                  line-height: 1.1;
                "
              >
                Mande sua
                <span
                  style="
                    font-family: &quot;Newsreader&quot;, serif;
                    font-style: italic;
                    font-weight: 400;
                    color: #f1b79e;
                  "
                  >mensagem</span
                >
              </h2>
              <p
                style="
                  margin: 18px 0 0;
                  font-size: 1rem;
                  line-height: 1.6;
                  color: #aaa499;
                  max-width: 34ch;
                "
              >
                Dúvidas, pedidos de oração ou apenas um oi — respondemos com
                carinho.
              </p>
            </div>
            <div class="card-white-pad">
              <form
                action="https://formsubmit.co/contato@ccf.org.br"
                method="POST"
                class="flex flex-col gap-14"
              >
                <input type="hidden" name="_captcha" value="false" />
                <input
                  type="hidden"
                  name="_next"
                  value="https://ccf.org.br/faleconosco.html"
                />
                <input
                  class="fc-field"
                  type="text"
                  name="nome"
                  placeholder="Seu nome"
                  aria-label="Nome"
                  required
                />
                <input
                  class="fc-field"
                  type="email"
                  name="email"
                  placeholder="Seu e-mail"
                  aria-label="E-mail"
                  required
                />
                <input
                  class="fc-field"
                  type="text"
                  name="cidade"
                  placeholder="Cidade / UF"
                  aria-label="Cidade e estado"
                  required
                />
                <textarea
                  class="fc-field fc-field--textarea"
                  name="mensagem"
                  placeholder="Escreva sua mensagem"
                  aria-label="Mensagem"
                  rows="4"
                  required
                ></textarea>
                <button
                  type="submit"
                  style="
                    margin-top: 4px;
                    font-family: inherit;
                    font-weight: 700;
                    font-size: 15px;
                    color: #fff;
                    background: #e94e1a;
                    border: none;
                    cursor: pointer;
                    padding: 16px;
                    border-radius: 12px;
                  "
                  style-hover="background:#C7400F"
                >
                  Enviar mensagem
                </button>
              </form>
            </div>
          </div>
        </div>

        <dc-import name="Footer" hint-size="100%,420px"></dc-import>
      </div>
    </x-dc>
    <script type="text/x-dc" data-dc-script>
      class Component extends DCLogic {
        componentDidMount() {
          const els = document.querySelectorAll('[data-reveal]');
          if (!('IntersectionObserver' in window)) { els.forEach(el => el.setAttribute('data-reveal','in')); return; }
          this._io = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.setAttribute('data-reveal','in'); this._io.unobserve(e.target); } });
          }, { threshold: 0.08 });
          els.forEach(el => this._io.observe(el));
        }
        componentWillUnmount() { if (this._io) this._io.disconnect(); }
      }
    </script>
  </body>
</html>
