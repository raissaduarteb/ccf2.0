<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&amp;display=swap" rel="stylesheet">
  <style>
    *{ box-sizing:border-box; }
    body{ margin:0; background:#F4F1EC; }
    [data-reveal]{ opacity:0; transform:translateY(20px); transition:opacity .6s ease,transform .6s ease; }
    [data-reveal="in"]{ opacity:1; transform:none; }
    @media (prefers-reduced-motion:reduce){ [data-reveal]{opacity:1;transform:none;transition:none} }
    @media (max-width:760px){ [data-pgm-head]{ flex-direction:column !important; align-items:flex-start !important; gap:18px !important; } }
  </style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;color:#211F1C;background:#F4F1EC;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column">

  <dc-import name="Header" hint-size="100%,72px"></dc-import>

  <section data-screen-label="Banner" style="position:relative;height:38vh;min-height:280px;display:flex;align-items:flex-end;overflow:hidden">
    <img src="images/reuniaodepgm.jpeg" alt="Pequeno Grupo Multiplicador" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 50%">
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,17,14,.42),rgba(20,17,14,.8))"></div>
    <div style="position:relative;max-width:1240px;margin:0 auto;padding:0 24px 44px;width:100%;color:#fff">
      <p style="margin: 0 0 12px; font-size: 12px; letter-spacing: .24em; font-weight: 600; color: #e94f1b">PEQUENO GRUPO MULTIPLICADOR</p>
      <h1 style="margin:0;font-size:clamp(2.2rem,5.5vw,3.8rem);font-weight:800;letter-spacing:-.02em;line-height:1.02">Roteiros de <span style="font-family:'Newsreader',serif;font-style:italic;font-weight:400">PGM</span></h1>
    </div>
  </section>

  <div style="max-width:1000px;margin:0 auto;width:100%;padding:clamp(48px,7vw,84px) 24px">
    <div data-reveal="" data-pgm-head="" style="display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:28px">
      <div>
        <p style="margin:0 0 8px;font-size:12px;letter-spacing:.18em;font-weight:700;color:#E94E1A">ROTEIRO ATUAL</p>
        <h2 style="margin:0 0 12px;font-size:clamp(1.5rem,3vw,2.1rem);font-weight:800;letter-spacing:-.01em">Roteiro mais recente</h2>
        <span id="roteiro-data" style="display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:999px;padding:8px 15px;font-size:13.5px;font-weight:600;color:#5f5b54">
          <span style="width:7px;height:7px;border-radius:50%;background:#E94E1A"></span>Carregando…
        </span>
      </div>
      <a href="https://drive.google.com/drive/folders/1qAax68W9SQxLrRGtkch_4k6caUwgQc4S?usp=sharing" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:14px;color:#fff;background:#E94E1A;text-decoration:none;padding:14px 24px;border-radius:999px;white-space:nowrap" style-hover="background:#C7400F">Ver todos os roteiros →</a>
    </div>

    <div data-reveal="" style="background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 2px 4px rgba(0,0,0,.04),0 16px 40px rgba(0,0,0,.07);border:1px solid rgba(0,0,0,.05)">
      <div id="roteiro-pgm" style="width:100%"></div>
    </div>

    <a data-reveal="" href="https://linktr.ee/comunidadecristafortaleza" target="_blank" rel="noopener" style="margin-top:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;background:#24211D;color:#fff;text-decoration:none;border-radius:18px;padding:26px 30px" style-hover="background:#1B1916">
      <span><span style="display: block; font-size: 12px; letter-spacing: .16em; color: #e94f1b; font-weight: 700; margin-bottom: 6px">AINDA NÃO PARTICIPA?</span><span style="font-size:1.25rem;font-weight:800;letter-spacing:-.01em">Entre em um PGM perto de você</span></span>
      <span style="flex:none;width:48px;height:48px;border-radius:50%;background:#E94E1A;display:flex;align-items:center;justify-content:center;font-size:20px">→</span>
    </a>
  </div>

  <dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  // ===== ROTEIROS DE PGM =====
  // Fonte única: para publicar um novo roteiro, adicione um objeto a esta lista
  // (a ordem não importa — a página exibe sempre o de data mais recente).
  //   data: 'AAAA-MM-DD'  ·  driveId: ID do arquivo no Google Drive (parte entre /d/ e /preview)
  roteiros = [
    { data: '2026-06-15', driveId: '11_93EUPKEDhrtk1RELE9ffyOkBU5wDdI' },
    // { data: '2026-06-08', driveId: 'COLE_AQUI_O_ID_DO_DRIVE' },
  ];

  componentDidMount() {
    const host = document.getElementById('roteiro-pgm');
    const atual = [...this.roteiros].sort((a, b) => new Date(b.data) - new Date(a.data))[0];
    if (host && !host.dataset.loaded && atual) {
      host.dataset.loaded = '1';
      host.innerHTML = `<iframe src="https://drive.google.com/file/d/${atual.driveId}/preview?nocache=${Date.now()}" title="Roteiro de PGM atual" style="width:100%;height:680px;border:0;display:block"></iframe>`;
    }
    const dataEl = document.getElementById('roteiro-data');
    if (dataEl && atual) {
      const d = new Date(atual.data + 'T00:00:00');
      const fmt = d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
      dataEl.innerHTML = `<span style="width:7px;height:7px;border-radius:50%;background:#E94E1A"></span>Adicionado em ${fmt}`;
    }
    const els = document.querySelectorAll('[data-reveal]');
    if (!('IntersectionObserver' in window)) { els.forEach(el => el.setAttribute('data-reveal','in')); return; }
    this._io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.setAttribute('data-reveal','in'); this._io.unobserve(e.target); } });
    }, { threshold: 0.06 });
    els.forEach(el => this._io.observe(el));
  }
  componentWillUnmount() { if (this._io) this._io.disconnect(); }
}
</script>
</body>
</html>
