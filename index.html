    <!--
      Loader otimizado:
      • Visitas repetidas → lê código já transpilado do localStorage e faz eval direto.
        Babel não é nem carregado. Carregamento quase instantâneo.
      • Primeira visita (ou após deploy) → carrega Babel dinamicamente, busca todos
        os .jsx em paralelo, transpila e salva o resultado no cache.
      Para forçar re-transpilação após um deploy, basta incrementar CACHE_VER.
    -->
    <script>
      (function () {
        var FILES = [
          "js/components/Header.jsx",
          "js/components/Footer.jsx",
          "js/components/Lightbox.jsx",
          "js/pages/Home.jsx",
          "js/pages/OndeEstamos.jsx",
          "js/pages/Contribuicao.jsx",
          "js/pages/FaleConosco.jsx",
          "js/pages/RoteirosPgm.jsx",
          "js/app.jsx",
        ];
        var CACHE_VER = "v19";
        var CACHE_KEY = "ccf_compiled_" + CACHE_VER;

        function evalAll(codes) {
          codes.forEach(function (code) {
            (0, eval)(code);
          });
        }

        // Cache hit → eval direto, sem Babel
        try {
          var hit = JSON.parse(localStorage.getItem(CACHE_KEY) || "null");
          if (hit && hit.length === FILES.length) {
            evalAll(hit);
            return;
          }
        } catch (_) {}

        // Cache miss → carregar Babel, buscar .jsx em paralelo, transpilar, salvar
        function loadScript(src) {
          return new Promise(function (res, rej) {
            var s = document.createElement("script");
            s.src = src;
            s.onload = res;
            s.onerror = rej;
            document.head.appendChild(s);
          });
        }

        loadScript("https://unpkg.com/@babel/standalone/babel.min.js")
          .then(function () {
            return Promise.all(
              FILES.map(function (f) {
                return fetch(f)
                  .then(function (r) {
                    if (!r.ok)
                      throw new Error(
                        "Falha ao carregar " + f + " (" + r.status + ")",
                      );
                    return r.text();
                  })
                  .then(function (src) {
                    return Babel.transform(src, {
                      presets: [["react", { runtime: "classic" }]],
                      filename: f,
                    }).code;
                  })
                  .catch(function (e) {
                    console.error("[CCF]", f, e);
                    throw e;
                  });
              }),
            );
          })
          .then(function (codes) {
            evalAll(codes);
            try {
              localStorage.setItem(CACHE_KEY, JSON.stringify(codes));
            } catch (_) {}
          })
          .catch(function (e) {
            console.error("[CCF] boot error", e);
          });
      })();
    </script>
