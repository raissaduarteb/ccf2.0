<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
          href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap"
          rel="stylesheet"
        />
      </helmet>
      <header
        class="site-header"
        style="background:{{ headerBg }};box-shadow:{{ headerShadow }};backdrop-filter:{{ headerBlur }}"
      >
        <div class="header-inner">
          <a
            href="Home.dc.html"
            aria-label="Página inicial"
            style="display:flex;align-items:center;gap:11px;text-decoration:none;color:{{ fg }};transition:color .25s ease"
          >
            <span
              style="
                width: 34px;
                height: 34px;
                border-radius: 9px;
                background: #e94e1a;
                display: flex;
                align-items: center;
                justify-content: center;
                flex: none;
              "
            >
              <span
                style="
                  display: block;
                  width: 13px;
                  height: 13px;
                  border: 3px solid #fff;
                  border-radius: 50%;
                "
              ></span>
            </span>
            <span
              style="display: flex; flex-direction: column; line-height: 1.05"
            >
              <span
                style="
                  font-weight: 800;
                  font-size: 15px;
                  letter-spacing: 0.06em;
                "
                >CCF</span
              >
              <span
                style="
                  font-weight: 500;
                  font-size: 9.5px;
                  letter-spacing: 0.16em;
                  opacity: 0.7;
                  white-space: nowrap;
                "
                >COMUNIDADE CRISTÃ</span
              >
            </span>
          </a>

          <nav
            aria-label="Principal"
            style="display: flex; align-items: center; gap: 4px"
            data-desktop-nav
          >
            <div
              style="position: relative"
              onMouseEnter="{{ openIgreja }}"
              onMouseLeave="{{ closeMenus }}"
            >
              <button
                type="button"
                aria-haspopup="true"
                onClick="{{ toggleIgreja }}"
                style="display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;letter-spacing:.02em;color:{{ fg }};padding:10px 14px;border-radius:10px"
              >
                IGREJA
                <span
                  style="
                    display: block;
                    width: 6px;
                    height: 6px;
                    border-right: 2px solid currentColor;
                    border-bottom: 2px solid currentColor;
                    transform: rotate(45deg);
                    margin-top: -3px;
                    opacity: 0.7;
                  "
                ></span>
              </button>
              <div
                style="position:absolute;top:100%;left:0;min-width:208px;padding:8px;background:#fff;border-radius:14px;box-shadow:0 18px 40px rgba(0,0,0,.16);border:1px solid rgba(0,0,0,.06);display:{{ igrejaDisplay }};flex-direction:column"
              >
                <a
                  href="Home.dc.html#quemsomos"
                  style="
                    padding: 11px 14px;
                    border-radius: 9px;
                    text-decoration: none;
                    color: #3a3631;
                    font-weight: 500;
                    font-size: 14px;
                  "
                  style-hover="background:#F4F1EC;color:#E94E1A"
                  >Quem somos</a
                >
                <a
                  href="Home.dc.html#nossavisao"
                  style="
                    padding: 11px 14px;
                    border-radius: 9px;
                    text-decoration: none;
                    color: #3a3631;
                    font-weight: 500;
                    font-size: 14px;
                  "
                  style-hover="background:#F4F1EC;color:#E94E1A"
                  >Nossa visão</a
                >
                <a
                  href="Onde Estamos.dc.html"
                  style="
                    padding: 11px 14px;
                    border-radius: 9px;
                    text-decoration: none;
                    color: #3a3631;
                    font-weight: 500;
                    font-size: 14px;
                  "
                  style-hover="background:#F4F1EC;color:#E94E1A"
                  >Onde estamos</a
                >
              </div>
            </div>

            <a
              href="Contribuição.dc.html"
              style="font-weight:600;font-size:14px;letter-spacing:.02em;color:{{ fg }};text-decoration:none;padding:10px 14px;border-radius:10px"
              >CONTRIBUIÇÃO</a
            >

            <div
              style="position: relative"
              onMouseEnter="{{ openConteudo }}"
              onMouseLeave="{{ closeMenus }}"
            >
              <button
                type="button"
                aria-haspopup="true"
                onClick="{{ toggleConteudo }}"
                style="display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;letter-spacing:.02em;color:{{ fg }};padding:10px 14px;border-radius:10px"
              >
                CONTEÚDO
                <span
                  style="
                    display: block;
                    width: 6px;
                    height: 6px;
                    border-right: 2px solid currentColor;
                    border-bottom: 2px solid currentColor;
                    transform: rotate(45deg);
                    margin-top: -3px;
                    opacity: 0.7;
                  "
                ></span>
              </button>
              <div
                style="position:absolute;top:100%;left:0;min-width:208px;padding:8px;background:#fff;border-radius:14px;box-shadow:0 18px 40px rgba(0,0,0,.16);border:1px solid rgba(0,0,0,.06);display:{{ conteudoDisplay }};flex-direction:column"
              >
                <a
                  href="Roteiros PGM.dc.html"
                  style="
                    padding: 11px 14px;
                    border-radius: 9px;
                    text-decoration: none;
                    color: #3a3631;
                    font-weight: 500;
                    font-size: 14px;
                  "
                  style-hover="background:#F4F1EC;color:#E94E1A"
                  >Roteiros PGM</a
                >
                <a
                  href="https://www.youtube.com/@comunidadecristaemfortaleza"
                  target="_blank"
                  rel="noopener"
                  style="
                    padding: 11px 14px;
                    border-radius: 9px;
                    text-decoration: none;
                    color: #3a3631;
                    font-weight: 500;
                    font-size: 14px;
                  "
                  style-hover="background:#F4F1EC;color:#E94E1A"
                  >Mensagens</a
                >
              </div>
            </div>

            <a
              href="Fale Conosco.dc.html"
              style="
                margin-left: 10px;
                white-space: nowrap;
                font-weight: 700;
                font-size: 14px;
                letter-spacing: 0.02em;
                color: #fff;
                background: #e94e1a;
                text-decoration: none;
                padding: 11px 20px;
                border-radius: 999px;
              "
              style-hover="background:#C7400F"
              >FALE CONOSCO</a
            >
          </nav>

          <button
            type="button"
            aria-label="Abrir menu"
            onClick="{{ openMobile }}"
            data-mobile-toggle
            style="display:none;background:none;border:none;cursor:pointer;padding:8px;color:{{ fg }}"
          >
            <span
              style="
                display: block;
                width: 24px;
                height: 2px;
                background: currentColor;
                border-radius: 2px;
              "
            ></span>
            <span
              style="
                display: block;
                width: 24px;
                height: 2px;
                background: currentColor;
                border-radius: 2px;
                margin-top: 6px;
              "
            ></span>
            <span
              style="
                display: block;
                width: 24px;
                height: 2px;
                background: currentColor;
                border-radius: 2px;
                margin-top: 6px;
              "
            ></span>
          </button>
        </div>

        <div
          role="dialog"
          aria-modal="true"
          aria-label="Menu"
          style="position:fixed;inset:0;z-index:1100;background:#24211D;color:#fff;transform:{{ mobileTransform }};opacity:{{ mobileOpacity }};pointer-events:{{ mobilePointer }};transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s ease;display:flex;flex-direction:column;padding:20px 24px 40px"
        >
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              height: 52px;
            "
          >
            <span style="display: flex; align-items: center; gap: 11px">
              <span
                style="
                  width: 34px;
                  height: 34px;
                  border-radius: 9px;
                  background: #e94e1a;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                "
              >
                <span
                  style="
                    display: block;
                    width: 13px;
                    height: 13px;
                    border: 3px solid #fff;
                    border-radius: 50%;
                  "
                ></span>
              </span>
              <span
                style="
                  font-weight: 800;
                  font-size: 15px;
                  letter-spacing: 0.06em;
                "
                >CCF</span
              >
            </span>
            <button
              type="button"
              aria-label="Fechar menu"
              onClick="{{ closeMobile }}"
              style="
                background: none;
                border: none;
                cursor: pointer;
                color: #fff;
                font-size: 30px;
                line-height: 1;
                padding: 4px 8px;
              "
            >
              &times;
            </button>
          </div>

          <div style="margin-top: 18px; display: flex; flex-direction: column">
            <span
              style="
                font-size: 12px;
                letter-spacing: 0.18em;
                color: #8a847a;
                font-weight: 600;
                padding: 18px 4px 8px;
              "
              >IGREJA</span
            >
            <a
              href="Home.dc.html#quemsomos"
              onClick="{{ closeMobile }}"
              style="
                padding: 14px 4px;
                font-size: 20px;
                font-weight: 600;
                color: #fff;
                text-decoration: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
              "
              >Quem somos</a
            >
            <a
              href="Home.dc.html#nossavisao"
              onClick="{{ closeMobile }}"
              style="
                padding: 14px 4px;
                font-size: 20px;
                font-weight: 600;
                color: #fff;
                text-decoration: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
              "
              >Nossa visão</a
            >
            <a
              href="Onde Estamos.dc.html"
              onClick="{{ closeMobile }}"
              style="
                padding: 14px 4px;
                font-size: 20px;
                font-weight: 600;
                color: #fff;
                text-decoration: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
              "
              >Onde estamos</a
            >
            <a
              href="Contribuição.dc.html"
              onClick="{{ closeMobile }}"
              style="
                padding: 14px 4px;
                font-size: 20px;
                font-weight: 600;
                color: #fff;
                text-decoration: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
              "
              >Contribuição</a
            >
            <a
              href="Roteiros PGM.dc.html"
              onClick="{{ closeMobile }}"
              style="
                padding: 14px 4px;
                font-size: 20px;
                font-weight: 600;
                color: #fff;
                text-decoration: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
              "
              >Roteiros PGM</a
            >
            <a
              href="https://www.youtube.com/@comunidadecristaemfortaleza"
              target="_blank"
              rel="noopener"
              style="
                padding: 14px 4px;
                font-size: 20px;
                font-weight: 600;
                color: #fff;
                text-decoration: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
              "
              >Mensagens</a
            >
          </div>

          <a
            href="Fale Conosco.dc.html"
            onClick="{{ closeMobile }}"
            style="
              margin-top: auto;
              text-align: center;
              font-weight: 700;
              font-size: 16px;
              letter-spacing: 0.02em;
              color: #fff;
              background: #e94e1a;
              text-decoration: none;
              padding: 17px;
              border-radius: 999px;
            "
            >FALE CONOSCO</a
          >
        </div>
      </header>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{"$preview":{"width":1240,"height":72}}'
    >
      class Component extends DCLogic {
        state = { scrolled: false, igreja: false, conteudo: false, mobile: false };

        componentDidMount() {
          this._onScroll = () => {
            const s = window.scrollY > 24;
            if (s !== this.state.scrolled) this.setState({ scrolled: s });
          };
          window.addEventListener('scroll', this._onScroll, { passive: true });
          this._onScroll();
        }
        componentWillUnmount() {
          window.removeEventListener('scroll', this._onScroll);
        }

        renderVals() {
          const scrolled = this.state.scrolled;
          return {
            headerBg: scrolled ? 'rgba(255,255,255,.92)' : 'linear-gradient(to bottom, rgba(20,18,16,.55), rgba(20,18,16,0))',
            headerShadow: scrolled ? '0 1px 0 rgba(0,0,0,.07)' : 'none',
            headerBlur: scrolled ? 'saturate(1.4) blur(12px)' : 'none',
            fg: scrolled ? '#211F1C' : '#ffffff',
            igrejaDisplay: this.state.igreja ? 'flex' : 'none',
            conteudoDisplay: this.state.conteudo ? 'flex' : 'none',
            openIgreja: () => this.setState({ igreja: true, conteudo: false }),
            openConteudo: () => this.setState({ conteudo: true, igreja: false }),
            closeMenus: () => this.setState({ igreja: false, conteudo: false }),
            toggleIgreja: () => this.setState(s => ({ igreja: !s.igreja, conteudo: false })),
            toggleConteudo: () => this.setState(s => ({ conteudo: !s.conteudo, igreja: false })),
            openMobile: () => this.setState({ mobile: true }),
            closeMobile: () => this.setState({ mobile: false }),
            mobileTransform: this.state.mobile ? 'translateY(0)' : 'translateY(-100%)',
            mobileOpacity: this.state.mobile ? '1' : '0',
            mobilePointer: this.state.mobile ? 'auto' : 'none',
          };
        }
      }
    </script>
  </body>
</html>
